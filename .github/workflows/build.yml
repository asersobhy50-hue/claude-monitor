name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ===========================
  # بناء نسخة Windows
  # ===========================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows Installer
        run: npx electron-builder build --win nsis
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ===========================
  # بناء نسخة macOS (ARM + Intel)
  # ===========================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG (ARM + Intel)
        run: npx electron-builder build --mac dmg --arm64 --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

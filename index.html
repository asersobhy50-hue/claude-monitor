<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #1A1A1A;
            --bg2: #242424;
            --card: #222222;
            --card-hover: #2A2A2A;
            --border: #333333;
            --accent: #4B96FF;
            --accent-yellow: #FFB340;
            --text: #F3F3F3;
            --text-muted: #999999;
            --success: #5CB870;
            --danger: #E05252;
            --glow-blue: rgba(75, 150, 255, 0.2);
            --glow-yellow: rgba(255, 179, 64, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* === Animated Background (Glassmorphism context) === */
        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .bg-glow .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15;
            animation: orbFloat 20s ease-in-out infinite;
        }
        .bg-glow .orb:nth-child(1) {
            width: 400px; height: 400px; background: var(--accent);
            top: -10%; right: -10%; animation-delay: 0s;
        }
        .bg-glow .orb:nth-child(2) {
            width: 300px; height: 300px; background: var(--accent-yellow);
            bottom: -15%; left: -10%; animation-delay: -7s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.9); }
        }

        /* === Main Container === */
        .widget-container {
            position: relative; z-index: 1;
            max-width: 800px; margin: 0 auto; padding: 24px;
        }

        /* === Header === */
        .widget-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; margin-bottom: 24px;
            background: rgba(34, 34, 34, 0.6); border: 1px solid var(--border);
            border-radius: 16px; backdrop-filter: blur(20px);
        }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-group h1 { font-size: 1.15rem; font-weight: 600; }
        
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease; font-size: 0.9rem;
        }
        .icon-btn:hover {
            background: rgba(255,255,255,0.05); color: var(--text);
            border-color: #555; transform: translateY(-1px);
        }
        .icon-btn.active-sync {
            color: var(--success);
            border-color: var(--success);
            animation: pulseSync 2s infinite;
        }
        @keyframes pulseSync {
            0% { box-shadow: 0 0 0 0 rgba(92,184,112,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(92,184,112,0); }
            100% { box-shadow: 0 0 0 0 rgba(92,184,112,0); }
        }

        /* === Layout Elements === */
        .section-title-out {
            font-size: 1rem; font-weight: 600; margin: 24px 0 16px 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .learn-more {
            font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 400;
        }
        .learn-more:hover { text-decoration: underline; }

        .section-card {
            background: rgba(34, 34, 34, 0.4); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px; margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        /* === Progress Components === */
        .stat-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 20px;
        }
        .stat-info {
            display: flex; flex-direction: column; gap: 4px; flex: 1;
        }
        .stat-name {
            font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; gap: 6px;
        }
        .reset-text {
            font-size: 0.8rem; color: var(--text-muted);
        }
        
        .progress-wrapper {
            flex: 2; display: flex; align-items: center; gap: 16px;
        }
        .progress-container {
            background: rgba(255,255,255,0.08); height: 6px; border-radius: 6px;
            width: 100%; overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; border-radius: 6px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .progress-bar::after {
            content: ''; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%); animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .progress-bar.blue { background: var(--accent); box-shadow: 0 0 10px var(--glow-blue); }
        .progress-bar.yellow { background: var(--accent-yellow); box-shadow: 0 0 10px var(--glow-yellow); }
        
        .progress-text-inline {
            font-size: 0.85rem; color: var(--text); min-width: 60px; text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .divider {
            height: 1px; background: var(--border); margin: 20px 0;
        }

        .last-updated {
            font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .last-updated i { transition: transform 0.3s; }
        .last-updated i:hover { transform: rotate(180deg); color: var(--text); }

        /* === Current Session Layout === */
        .current-session-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .current-session-header .stat-name { font-size: 1rem; }
        .current-session-wrapper {
            display: flex; align-items: center; gap: 16px;
        }

        /* === Widget Mode === */
        body.widget-mode {
            background: transparent;
            overflow: hidden;
        }
        body.widget-mode .bg-glow { display: none; }
        body.widget-mode .widget-container { padding: 8px; max-width: 100%; }
        body.widget-mode .widget-header {
            margin-bottom: 10px; padding: 10px 14px; -webkit-app-region: drag;
            background: rgba(26, 26, 26, 0.9);
        }
        body.widget-mode .header-actions button { -webkit-app-region: no-drag; }
        
        /* Hide everything except current session and a compact view of others */
        body.widget-mode .section-title-out,
        body.widget-mode .learn-more,
        body.widget-mode .last-updated { display: none; }
        
        body.widget-mode .section-card { padding: 12px; margin-bottom: 8px; background: rgba(26, 26, 26, 0.8); }
        body.widget-mode .stat-row { flex-direction: column; align-items: stretch; gap: 8px; }
        body.widget-mode .progress-wrapper { gap: 10px; }
        body.widget-mode .divider { margin: 10px 0; }
        body.widget-mode .reset-text { display: none; } /* Hide descriptions in widget to save space */

        /* === Animations === */
        .fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* === Toast === */
        .toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 500;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 3s forwards;
            display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px);
            background: rgba(34,34,34,0.9); border: 1px solid var(--border);
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="bg-glow" aria-hidden="true">
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="widget-container">
        <!-- Header -->
        <header class="widget-header fade-in">
            <div class="logo-group">
                <h1>Plan usage limits Pro</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btnHeaderRefresh" title="تحديث البيانات">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="icon-btn" id="btnToggleMode" title="Toggle Widget Mode">
                    <i class="fas fa-compress"></i>
                </button>
                <button class="icon-btn" id="btnConnect" title="Connect Claude Account for Auto-Sync">
                    <i class="fas fa-link"></i>
                </button>
                <button class="icon-btn" id="btnSettings" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- Current Session -->
        <div class="section-card fade-in" style="animation-delay:0.1s">
            <div class="current-session-header">
                <span class="stat-name">Current session</span>
                <span class="reset-text" id="sessionResets">Waiting for data...</span>
            </div>
            <div class="current-session-wrapper">
                <div class="progress-container flex-grow">
                    <div class="progress-bar blue" id="sessionBar" style="width: 0%"></div>
                </div>
                <div class="progress-text-inline" id="sessionText">0% used</div>
            </div>
        </div>

        <div class="section-title-out fade-in" style="animation-delay:0.15s">
            Weekly limits
            <a href="#" class="learn-more">Learn more about usage limits</a>
        </div>

        <!-- Weekly Limits -->
        <div class="section-card fade-in" style="animation-delay:0.2s">
            <div class="stat-row">
                <div class="stat-info">
                    <span class="stat-name">All models</span>
                    <span class="reset-text" id="allModelsResets">Waiting for data...</span>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-container flex-grow">
                        <div class="progress-bar blue" id="allModelsBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-text-inline" id="allModelsText">0% used</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="stat-row">
                <div class="stat-info">
                    <span class="stat-name">Claude Design <i class="fas fa-info-circle text-muted" title="Design features"></i></span>
                    <span class="reset-text" id="designResets">Waiting for data...</span>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-container flex-grow">
                        <div class="progress-bar yellow" id="designBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-text-inline" id="designText">0% used</div>
                </div>
            </div>
        </div>

        <div class="last-updated fade-in" style="animation-delay:0.25s">
            Last updated: <span id="lastUpdatedTime">never</span> 
            <i class="fas fa-sync-alt" id="btnRefresh" title="Refresh Now"></i>
        </div>

        <div class="section-title-out fade-in" style="margin-top: 24px; animation-delay:0.3s">
            Additional features
        </div>
        
        <!-- Additional Features -->
        <div class="section-card fade-in" style="animation-delay:0.35s">
            <div class="stat-row">
                <div class="stat-info">
                    <span class="stat-name">Daily included routine runs <i class="fas fa-info-circle text-muted" title="Routine runs"></i></span>
                    <span class="reset-text" id="routineResets">You haven't run any routines yet</span>
                </div>
                <div class="progress-wrapper" style="align-items: center">
                    <div class="progress-container flex-grow" style="height: 4px;">
                        <div class="progress-bar blue" id="routineBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-text-inline" id="routineText">0/5</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === UI Elements ===
        const btnToggleMode = document.getElementById('btnToggleMode');
        const btnConnect = document.getElementById('btnConnect');
        const btnRefresh = document.getElementById('btnRefresh');

        const sessionBar = document.getElementById('sessionBar');
        const sessionText = document.getElementById('sessionText');
        const sessionResets = document.getElementById('sessionResets');

        const allModelsBar = document.getElementById('allModelsBar');
        const allModelsText = document.getElementById('allModelsText');
        const allModelsResets = document.getElementById('allModelsResets');

        const designBar = document.getElementById('designBar');
        const designText = document.getElementById('designText');
        const designResets = document.getElementById('designResets');

        const routineBar = document.getElementById('routineBar');
        const routineText = document.getElementById('routineText');

        const lastUpdatedTime = document.getElementById('lastUpdatedTime');
        const toastContainer = document.getElementById('toastContainer');

        const btnHeaderRefresh = document.getElementById('btnHeaderRefresh');

        let isSyncing = false;

        // === Helpers ===
        function showToast(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            const color = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--danger)' : 'var(--text)';
            el.innerHTML = `<i class="fas fa-${icon}" style="color:${color}"></i> ${msg}`;
            toastContainer.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        function updateProgress(barEl, textEl, percentageStr) {
            if (!percentageStr) return;
            const val = parseFloat(percentageStr);
            if (!isNaN(val)) {
                barEl.style.width = val + '%';
                textEl.textContent = percentageStr;
            }
        }

        // === IPC Listeners ===
        if (window.electronAPI) {
            
            btnToggleMode.addEventListener('click', () => {
                window.electronAPI.toggleWidgetMode();
            });

            btnConnect.addEventListener('click', () => {
                showToast('Opening Claude Login...', 'info');
                window.electronAPI.startAuth();
            });

            const doRefresh = () => {
                if (isSyncing) return;
                isSyncing = true;
                btnHeaderRefresh.classList.add('fa-spin');
                if(btnRefresh) btnRefresh.classList.add('fa-spin');
                window.electronAPI.startScraping();
                showToast('Syncing data...', 'info');
            };

            btnRefresh.addEventListener('click', doRefresh);
            btnHeaderRefresh.addEventListener('click', doRefresh);

            window.electronAPI.onModeChanged((mode) => {
                if (mode === 'widget') {
                    document.body.classList.add('widget-mode');
                    btnToggleMode.innerHTML = '<i class="fas fa-expand"></i>';
                } else {
                    document.body.classList.remove('widget-mode');
                    btnToggleMode.innerHTML = '<i class="fas fa-compress"></i>';
                }
            });

            window.electronAPI.onUsageData((data) => {
                isSyncing = false;
                btnHeaderRefresh.classList.remove('fa-spin');
                if(btnRefresh) btnRefresh.classList.remove('fa-spin');
                
                if (data.session) {
                    updateProgress(sessionBar, sessionText, data.session.percent);
                    if(data.session.resets) sessionResets.textContent = data.session.resets;
                }
                if (data.allModels) {
                    updateProgress(allModelsBar, allModelsText, data.allModels.percent);
                    if(data.allModels.resets) allModelsResets.textContent = data.allModels.resets;
                }
                if (data.design) {
                    updateProgress(designBar, designText, data.design.percent);
                    if(data.design.resets) designResets.textContent = data.design.resets;
                }
                if (data.routineRuns) {
                    routineText.textContent = data.routineRuns;
                    const parts = data.routineRuns.split('/');
                    if(parts.length === 2) {
                        const val = parseInt(parts[0]);
                        const max = parseInt(parts[1]);
                        if(max > 0) routineBar.style.width = ((val/max)*100) + '%';
                    }
                }
                if (data.timestamp) {
                    lastUpdatedTime.textContent = data.timestamp;
                }
                
                showToast('Usage limits updated!', 'success');
            });

            window.electronAPI.onScrapeError((err) => {
                isSyncing = false;
                btnHeaderRefresh.classList.remove('fa-spin');
                if(btnRefresh) btnRefresh.classList.remove('fa-spin');
                showToast('Failed to sync. Please ensure you are logged in.', 'error');
                console.error(err);
            });

            // Start scraping automatically on load if connected previously
            setTimeout(() => {
                isSyncing = true;
                btnConnect.classList.add('active-sync');
                window.electronAPI.startScraping();
            }, 2000);
            
        } else {
            // Web Mock for preview
            showToast('Running in web mock mode. Please launch via Electron to sync data.', 'info');
            setTimeout(() => {
                updateProgress(sessionBar, sessionText, '13% used');
                sessionResets.textContent = 'Resets in 39 min';
                
                updateProgress(allModelsBar, allModelsText, '10% used');
                allModelsResets.textContent = 'Resets Thu 7:00 AM';
                
                updateProgress(designBar, designText, '77% used');
                designResets.textContent = 'Resets Thu 7:00 AM';
                
                lastUpdatedTime.textContent = 'just now';
            }, 1000);
        }
    </script>
</body>
</html>
